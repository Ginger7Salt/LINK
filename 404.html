    <style>
      :root {
        color: #1b1714;
        background: #f5f0ea;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background:
          radial-gradient(circle at top, #fffaf6 0%, #f8f2ec 38%, #f2ebe3 100%);
      }

      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: inherit;
        transition: opacity 280ms ease, visibility 280ms ease;
      }

      #boot-loader.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .boot-loader__inner {
        display: grid;
        width: min(248px, calc(100vw - 64px));
      }

      .boot-loader__wave {
        display: grid;
        place-items: center;
      }

      .boot-loader__wave svg {
        width: 100%;
        height: auto;
        overflow: visible;
      }

      .boot-loader__wave-track {
        stroke: rgba(141, 123, 109, 0.2);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .boot-loader__wave-line {
        stroke: #9f8571;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        stroke-dasharray: 320;
        stroke-dashoffset: 320;
        filter: drop-shadow(0 4px 12px rgba(159, 133, 113, 0.24));
        animation: boot-wave 1.8s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }

      @keyframes boot-wave {
        0% {
          stroke-dashoffset: 320;
          opacity: 0.4;
        }

        22% {
          opacity: 1;
        }

        55% {
          stroke-dashoffset: 0;
          opacity: 1;
        }

        100% {
          stroke-dashoffset: -320;
          opacity: 0.25;
        }
      }
    </style>
