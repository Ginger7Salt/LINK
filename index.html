<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Link" />
    <link rel="icon" href="%BASE_URL%link-icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="%BASE_URL%link-icon.png" />
    <style>
      :root {
        color: #111111;
        background: #ffffff;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #ffffff;
      }

      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: max(20px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(34px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
        background: #fffdfa;
        transition: opacity 320ms ease, visibility 320ms ease;
      }

      #boot-loader.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .boot-loader__inner {
        display: grid;
        justify-items: center;
        gap: 18px;
        width: min(100%, 780px);
      }

      .boot-loader__image {
        display: block;
        width: min(100%, 760px);
        max-height: min(72dvh, 620px);
        object-fit: contain;
      }

      .boot-loader__progress {
        display: grid;
        gap: 8px;
        width: min(68vw, 280px);
      }

      .boot-loader__track {
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(225, 74, 92, 0.14);
      }

      .boot-loader__bar {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #ef6374, #5ba6bd);
        transition: width 180ms ease-out;
      }

      .boot-loader__meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #c84f63;
        font: 600 12px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .boot-loader__label {
        letter-spacing: 0;
      }

      @media (max-width: 520px) {
        .boot-loader__inner {
          gap: 14px;
        }

        .boot-loader__image {
          max-height: 68dvh;
        }

        .boot-loader__progress {
          width: min(76vw, 280px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #boot-loader,
        .boot-loader__bar {
          transition: none;
        }
      }
    </style>
    <title>Link</title>
  </head>
  <body>
    <div id="boot-loader" aria-live="polite" aria-label="正在加载 Link">
      <div class="boot-loader__inner">
        <img class="boot-loader__image" src="%BASE_URL%loading.png" alt="" decoding="async" />
        <div class="boot-loader__progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="boot-loader__track">
            <div class="boot-loader__bar"></div>
          </div>
          <div class="boot-loader__meta">
            <span class="boot-loader__label">Loading</span>
            <span class="boot-loader__value">0%</span>
          </div>
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script>
      (() => {
        const loader = document.getElementById('boot-loader');
        const progress = loader?.querySelector('.boot-loader__progress');
        const bar = loader?.querySelector('.boot-loader__bar');
        const value = loader?.querySelector('.boot-loader__value');

        if (!loader || !progress || !bar || !value) return;

        let current = 0;
        let timer = 0;
        let isDone = false;

        const setProgress = (next) => {
          current = Math.max(current, Math.min(next, 100));
          const percent = `${Math.round(current)}%`;
          bar.style.width = percent;
          value.textContent = percent;
          progress.setAttribute('aria-valuenow', String(Math.round(current)));
        };

        const tick = () => {
          if (current >= 92) return;
          const step = current < 52 ? 8 : current < 78 ? 4 : 1.5;
          setProgress(current + Math.random() * step);
          timer = window.setTimeout(tick, 140 + Math.random() * 180);
        };

        const finish = () => {
          if (isDone) return;
          isDone = true;
          window.clearTimeout(timer);
          setProgress(100);
          window.setTimeout(() => {
            loader.classList.add('is-hidden');
            window.setTimeout(() => loader.remove(), 340);
          }, 220);
        };

        tick();
        window.addEventListener('link:app-mounted', finish, { once: true });
        window.setTimeout(finish, 8000);
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
